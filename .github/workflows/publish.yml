name: Publish to npm

# Runs when you push a version tag like v0.1.0, v1.2.3, etc.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: macos-latest   # need macOS so postinstall can compile the Swift host
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Install deps + compile island-host-bin via postinstall
      - run: npm install

      # Publish to npm (public access — required for scoped packages).
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
